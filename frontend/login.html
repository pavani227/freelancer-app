<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Login — FreelanceHub</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body class="auth-body">

  <div class="auth-card">

    <div class="auth-logo">
      Freelance<span>Hub</span>
    </div>

    <h2>Welcome back</h2>

    <p class="auth-sub">
      Sign in to manage your freelance business
    </p>

    <div class="form-group">

      <label>Username</label>

      <input
        type="text"
        id="username"
        placeholder="Enter username"
      />

    </div>

    <div class="form-group">

      <label>Password</label>

      <input
        type="password"
        id="password"
        placeholder="Enter password"
      />

    </div>

    <div
      id="loginErr"
      class="err-msg"
    ></div>

    <button
      class="btn-primary"
      onclick="doLogin()"
    >
      Login →
    </button>

    <p class="hint">
      Default:
      <strong>admin</strong>
      /
      <strong>admin123</strong>
    </p>

  </div>

  <script>

    // Already logged in
    if (
      localStorage.getItem("loggedIn") === "true"
    ) {
      window.location.href = "dashboard.html";
    }

    // Login function
    async function doLogin() {

      const username =
        document.getElementById("username")
        .value
        .trim();

      const password =
        document.getElementById("password")
        .value
        .trim();

      const err =
        document.getElementById("loginErr");

      err.textContent = "";

      try {

        const res = await fetch(
          "http://localhost:5000/api/login",
          {
            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              username,
              password
            })
          }
        );

        const data = await res.json();

        if (data.success) {

          localStorage.setItem(
            "loggedIn",
            "true"
          );

          window.location.href =
            "dashboard.html";

        } else {

          err.textContent =
            data.message;
        }

      } catch {

        err.textContent =
          "Server error. Make sure server.js is running.";
      }
    }

    // Enter key login
    document.addEventListener(
      "keydown",
      e => {
        if (e.key === "Enter") {
          doLogin();
        }
      }
    );

  </script>

</body>
</html>
