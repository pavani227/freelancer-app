<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clients — FreelanceHub</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Freelance<span>Hub</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="clients.html"   class="nav-item active">👥 Clients</a>
        <a href="projects.html"  class="nav-item">📁 Projects</a>
        <a href="invoices.html"  class="nav-item">🧾 Invoices</a>
      </nav>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </aside>
    <main class="main">
      <div class="page-header">
        <h1>Clients</h1>
        <p>Manage your client directory</p>
      </div>

      <!-- Add Client Form -->
      <div class="section-card">
        <h2>Add New Client</h2>
        <div class="form-row">
          <div class="form-group"><label>Full Name / Company</label><input type="text" id="cName" placeholder="e.g. Rahul Enterprises"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="cEmail" placeholder="email@example.com"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input type="text" id="cPhone" placeholder="9876543210"/></div>
          <div class="form-group"><label>Address</label><input type="text" id="cAddress" placeholder="City, State"/></div>
        </div>
        <button class="btn-primary" onclick="addClient()">Add Client</button>
        <div id="clientMsg" class="form-msg"></div>
      </div>

      <!-- Clients Table -->
      <div class="section-card">
        <h2>All Clients</h2>
        <table class="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Action</th></tr></thead>
          <tbody id="clientsBody"><tr><td colspan="5">Loading...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    checkAuth();
    async function loadClients() {
      const clients = await fetchData("/api/clients");
      document.getElementById("clientsBody").innerHTML = clients.length === 0
        ? `<tr><td colspan="5" style="text-align:center;color:var(--muted)">No clients yet</td></tr>`
        : clients.map(c => `<tr>
            <td><strong>${c.name}</strong></td>
            <td>${c.email}</td>
            <td>${c.phone || "-"}</td>
            <td>${c.address || "-"}</td>
            <td><button class="btn-del" onclick="deleteClient(${c.id})">Delete</button></td>
          </tr>`).join("");
    }
    async function addClient() {
      const name    = document.getElementById("cName").value.trim();
      const email   = document.getElementById("cEmail").value.trim();
      const phone   = document.getElementById("cPhone").value.trim();
      const address = document.getElementById("cAddress").value.trim();
      const msg = document.getElementById("clientMsg");
      if (!name || !email) { msg.textContent = "Name and email are required."; msg.className = "form-msg error"; return; }
      await postData("/api/clients", { name, email, phone, address });
      msg.textContent = "✅ Client added!"; msg.className = "form-msg success";
      ["cName","cEmail","cPhone","cAddress"].forEach(id => document.getElementById(id).value = "");
      loadClients();
    }
    async function deleteClient(id) {
      if (!confirm("Delete this client?")) return;
      await fetch(`/api/clients/${id}`, { method: "DELETE" });
      loadClients();
    }
    loadClients();
  </script>
</body>
</html>
